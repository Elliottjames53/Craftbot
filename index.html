<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CraftBot"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <title>CraftBot</title>
  <script>
    // Inline PWA manifest injected dynamically so no separate file is needed
    const manifest = {
      name: "CraftBot",
      short_name: "CraftBot",
      description: "Minecraft Expert AI",
      start_url: ".",
      display: "standalone",
      background_color: "#1a1a2e",
      theme_color: "#5B8A3C",
      icons: [
        {
          src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='24' fill='%231a1a2e'/><rect width='192' height='192' rx='24' fill='%235B8A3C' y='0'/><rect width='192' height='70' rx='0' fill='%238B6914' y='122'/><rect width='192' height='50' rx='0' fill='%235B8A3C' y='100'/><rect width='192' height='22' rx='0' fill='%236B7A1C' y='120'/><text x='96' y='108' font-size='80' text-anchor='middle' dominant-baseline='middle'>%E2%9B%8F%EF%B8%8F</text></svg>",
          sizes: "192x192",
          type: "image/svg+xml",
          purpose: "any maskable"
        }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.currentScript.after(link);
  </script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1a1a2e;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(91,138,60,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(204,34,0,0.1) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,255,255,0.02) 31px, rgba(255,255,255,0.02) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(255,255,255,0.02) 31px, rgba(255,255,255,0.02) 32px);
    }

    #header {
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top));
      border-bottom: 2px solid rgba(91,138,60,0.4);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .grass-icon {
      width: 36px; height: 36px;
      border-radius: 6px;
      background: linear-gradient(to bottom, #5B8A3C 60%, #8B6914 100%);
      border: 2px solid #3d5a2c;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .header-title {
      font-family: 'VT323', monospace;
      font-size: 30px; color: #7EC850;
      letter-spacing: 2px; line-height: 1;
      text-shadow: 0 0 20px rgba(126,200,80,0.5);
    }

    .header-sub { font-size: 10px; color: #6B8A5A; letter-spacing: 0.5px; }

    .online-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: #CC4422;
      animation: pulse 2s infinite;
    }

    .red-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #CC2200; box-shadow: 0 0 6px #CC2200;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #empty {
      text-align: center;
      padding: 24px 10px;
      animation: fadeIn 0.6s ease;
    }

    .empty-icon { font-size: 52px; margin-bottom: 10px; }

    .empty-title {
      font-family: 'VT323', monospace;
      font-size: 24px; color: #7EC850;
      letter-spacing: 1px; margin-bottom: 6px;
    }

    .empty-sub { font-size: 12px; color: #4a6a3a; margin-bottom: 24px; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

    .suggest-btn {
      background: rgba(91,138,60,0.12);
      border: 1px solid rgba(91,138,60,0.35);
      color: #8BC870; padding: 8px 12px; border-radius: 4px;
      cursor: pointer; font-size: 12px;
      font-family: 'Share Tech Mono', monospace;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .suggest-btn:active { background: rgba(91,138,60,0.25); border-color: #5B8A3C; }

    .msg-row { display: flex; animation: fadeIn 0.3s ease; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; align-items: flex-start; }

    .bot-avatar {
      width: 28px; height: 28px; border-radius: 4px;
      background: #2d4a1e; border: 1px solid #5B8A3C;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; margin-right: 8px; flex-shrink: 0; margin-top: 2px;
    }

    .bot-content { display: flex; flex-direction: column; gap: 8px; max-width: 82%; }

    .bubble {
      padding: 11px 14px;
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }

    .bubble.user {
      max-width: 78%;
      background: linear-gradient(135deg, #3d6b26, #2d5018);
      border: 1px solid rgba(91,138,60,0.5);
      border-radius: 12px 12px 4px 12px;
      color: #d4f0b8;
      box-shadow: 0 2px 12px rgba(91,138,60,0.2);
    }

    .bubble.bot {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px 12px 12px 4px;
      color: #c8d8c0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .resources-label {
      font-size: 10px; color: #CC4422;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 5px;
    }

    .tutorial-cards { display: flex; flex-direction: column; gap: 6px; }

    .tutorial-card {
      display: flex; align-items: center; gap: 10px;
      background: rgba(180,50,20,0.08);
      border: 1px solid rgba(180,50,20,0.25);
      border-radius: 6px; padding: 8px 12px;
      text-decoration: none; color: #e8a090;
      font-size: 12px; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tutorial-card:active { background: rgba(180,50,20,0.2); }

    .wiki-card {
      display: flex; align-items: center; gap: 10px;
      background: rgba(91,138,60,0.08);
      border: 1px solid rgba(91,138,60,0.25);
      border-radius: 6px; padding: 8px 12px;
      text-decoration: none; color: #8BC870;
      font-size: 12px; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .wiki-card:active { background: rgba(91,138,60,0.2); }

    .card-icon {
      width: 30px; height: 30px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: rgba(0,0,0,0.3);
    }

    .card-text { flex: 1; }
    .card-title { font-size: 12px; margin-bottom: 1px; }
    .card-source { font-size: 10px; opacity: 0.6; }
    .card-arrow { font-size: 14px; opacity: 0.5; }

    #loading-row { display: none; animation: fadeIn 0.3s ease; }

    .dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .dot { width: 8px; height: 8px; border-radius: 2px; background: #5B8A3C; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    #input-area {
      padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 2px solid rgba(91,138,60,0.3);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .input-box {
      display: flex; gap: 10px; align-items: flex-end;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(91,138,60,0.4);
      border-radius: 8px; padding: 10px 12px;
    }

    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #b8d4a8; font-size: 15px;
      font-family: 'Share Tech Mono', monospace;
      resize: none; line-height: 1.5; max-height: 100px; overflow-y: auto;
    }

    #msg-input::placeholder { color: #3d5a30; }

    #send-btn {
      background: #5B8A3C; border: none; border-radius: 6px;
      padding: 8px 14px; cursor: pointer; color: #fff;
      font-size: 18px; line-height: 1;
      transition: all 0.2s; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:disabled { background: #2d3d22; color: #4a6a3a; cursor: not-allowed; }
    #send-btn:active:not(:disabled) { transform: scale(0.95); background: #4a7032; }

    .hint { text-align: center; margin-top: 7px; font-size: 10px; color: #3a5030; letter-spacing: 0.5px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #3d5a2c; border-radius: 3px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</head>
<body>

<div id="header">
  <div class="grass-icon">⛏️</div>
  <div>
    <div class="header-title">CRAFTBOT</div>
    <div class="header-sub">MINECRAFT EXPERT AI • REDSTONE SPECIALIST</div>
  </div>
  <div class="online-badge">
    <div class="red-dot"></div>
    ONLINE
  </div>
</div>

<div id="chat">
  <div id="empty">
    <div class="empty-icon">⛏️</div>
    <div class="empty-title">WHAT DO YOU NEED TO KNOW?</div>
    <div class="empty-sub">Ask me anything — I'll explain it and find you tutorials</div>
    <div class="suggestions">
      <button class="suggest-btn" onclick="sendMessage('How do I make a beacon?')">How do I make a beacon?</button>
      <button class="suggest-btn" onclick="sendMessage('Best way to find diamonds?')">Best way to find diamonds?</button>
      <button class="suggest-btn" onclick="sendMessage('How does a redstone comparator work?')">How does a comparator work?</button>
      <button class="suggest-btn" onclick="sendMessage('How to build a simple mob farm?')">How to build a mob farm?</button>
      <button class="suggest-btn" onclick="sendMessage('What do I need to beat the Ender Dragon?')">Beat the Ender Dragon?</button>
      <button class="suggest-btn" onclick="sendMessage('How to make an automatic item sorter?')">Auto item sorter?</button>
    </div>
  </div>

  <div id="loading-row" class="msg-row bot">
    <div class="bot-avatar">⛏️</div>
    <div class="bubble bot">
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-box">
    <textarea id="msg-input" placeholder="Ask about crafting, redstone, mobs..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
  <div class="hint">Tap ➤ to send</div>
</div>

<script>
const SYSTEM = `You are CraftBot, the ultimate Minecraft expert. You have encyclopedic knowledge of all Minecraft content.

EXPERTISE INCLUDES:
- All items, blocks, crafting recipes (Java and Bedrock editions)
- All mobs: behavior, drops, spawn conditions
- All biomes, structures, dimensions (Overworld, Nether, End)
- All enchantments, potions, status effects, advancements
- Game mechanics: hunger, health, XP, sleep, weather, commands

REDSTONE MASTERY (extremely detailed):
- All components: dust, torches, repeaters, comparators, pistons, observers, dispensers, droppers, hoppers
- Signal strength 0-15, propagation and decay rules
- Logic gates: NOT, AND, OR, NAND, NOR, XOR, XNOR
- Latches and flip-flops: RS, T, D, JK
- Clocks: torch, observer, hopper, comparator clocks
- Piston mechanics: sticky vs regular, quasi-connectivity, 0-tick pulses (Java)
- BUD switches, monostable circuits, pulse extenders and shorteners
- Slime block and honey block flying machines
- Item sorters, storage systems, auto-farms
- Comparator: container mode vs subtraction mode
- Java vs Bedrock redstone differences
- Timing, game ticks vs redstone ticks

RESPONSE RULES — VERY IMPORTANT:
You MUST always respond with valid JSON only. No markdown, no preamble, no code fences. Exactly this structure:

{
  "answer": "Your answer here. Be friendly and expert. Use newlines for readability. For builds/redstone give clear step-by-step instructions.",
  "tutorials": [
    {
      "type": "youtube",
      "title": "Brief title under 45 chars",
      "query": "specific youtube search query"
    },
    {
      "type": "wiki",
      "title": "Wiki page name",
      "page": "ExactWikiPageSlug"
    }
  ]
}

TUTORIAL GUIDELINES:
- Include 1-2 youtube entries for: how-to questions, builds, farms, redstone, crafting
- Include 1 wiki entry for: any specific item, mob, block, mechanic, or structure
- For simple fact questions (drops, locations) just wiki, no youtube needed
- YouTube query must be specific: e.g. "minecraft automatic iron farm tutorial 1.21"
- Wiki page slug must match minecraft.wiki exactly: e.g. "Beacon", "Redstone_Comparator", "Creeper", "Nether_Fortress"
- If truly no tutorials apply, use empty array: []
- NEVER include more than 3 tutorial entries total`;

let history = [];
let loading = false;

const chatEl = document.getElementById('chat');
const emptyEl = document.getElementById('empty');
const loadingRow = document.getElementById('loading-row');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim();
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  sendBtn.disabled = !el.value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function scrollBottom() { setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 50); }

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user">${esc(text)}</div>`;
  chatEl.insertBefore(row, loadingRow);
  scrollBottom();
}

function addBotMessage(answer, tutorials) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';

  let cardsHtml = '';
  if (tutorials && tutorials.length > 0) {
    const cards = tutorials.map(t => {
      if (t.type === 'youtube') {
        const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(t.query)}`;
        return `<a href="${url}" target="_blank" class="tutorial-card">
          <div class="card-icon">▶️</div>
          <div class="card-text">
            <div class="card-title" style="color:#f0b8a0">${esc(t.title)}</div>
            <div class="card-source">YouTube</div>
          </div>
          <div class="card-arrow">›</div>
        </a>`;
      } else {
        const url = `https://minecraft.wiki/w/${encodeURIComponent(t.page)}`;
        return `<a href="${url}" target="_blank" class="wiki-card">
          <div class="card-icon">📖</div>
          <div class="card-text">
            <div class="card-title">${esc(t.title)}</div>
            <div class="card-source">Minecraft Wiki</div>
          </div>
          <div class="card-arrow">›</div>
        </a>`;
      }
    }).join('');

    cardsHtml = `<div class="tutorial-cards">
      <div class="resources-label">🔴 Resources</div>
      ${cards}
    </div>`;
  }

  row.innerHTML = `
    <div class="bot-avatar">⛏️</div>
    <div class="bot-content">
      <div class="bubble bot">${esc(answer)}</div>
      ${cardsHtml}
    </div>`;

  chatEl.insertBefore(row, loadingRow);
  scrollBottom();
}

async function sendMessage(preset) {
  const text = preset || inputEl.value.trim();
  if (!text || loading) return;

  emptyEl.style.display = 'none';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  loading = true;

  addUserBubble(text);
  history.push({ role: 'user', content: text });
  loadingRow.style.display = 'flex';
  scrollBottom();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || '').join('');

    let answer = raw;
    let tutorials = [];

    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      answer = parsed.answer || raw;
      tutorials = Array.isArray(parsed.tutorials) ? parsed.tutorials : [];
    } catch(e) { answer = raw; }

    history.push({ role: 'assistant', content: raw });
    loadingRow.style.display = 'none';
    addBotMessage(answer, tutorials);

  } catch(err) {
    loadingRow.style.display = 'none';
    addBotMessage('⚠️ Connection error. Check your internet and try again.', []);
  }

  loading = false;
}
</script>
</body>
</html>
